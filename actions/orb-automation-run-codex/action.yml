name: 'orb Automation Run (Codex)'
description: 'Run an orb automation using Codex (OpenAI) as the execution engine'
author: 'augur-ai'

branding:
  icon: 'cpu'
  color: 'orange'

# Secrets: set OPENAI_API_KEY (or the env var the Codex CLI expects) in workflow env.
# Also: ORB_API_TOKEN, optional ORB_BACKEND_URL.

inputs:
  automation:
    description: 'Automation ID to run (e.g. insurance-provider-e2e-pdf-validate)'
    required: true

  params:
    description: |
      Newline-separated key=value pairs passed as --param flags to orb automation exec.
    required: false
    default: ''

  orb_version:
    description: 'orb version to install. Defaults to latest.'
    required: false
    default: 'latest'

  orb_binary_path:
    description: 'Path to a pre-built orb binary. If set, skips the download step.'
    required: false
    default: ''

  model:
    description: |
      Codex model to use. Default is gpt-5.3-codex (matches the model
      orb's codex subagents use internally; reliable tool-calling on
      procedure prompts). The legacy default 'o3-mini' dropped into
      "narration-only" turns (no tool calls → orchestrator exits with
      all tasks pending). Override for cheaper runs e.g. gpt-5.1-codex-
      mini.
    required: false
    default: 'gpt-5.3-codex'

  max_turns:
    description: 'Maximum number of agentic turns. Leave empty if no limit.'
    required: false
    default: ''

  working_directory:
    description: |
      Working directory for orb commands. Automations are loaded from this dir (e.g. .orb/procedures/).
    required: false
    default: '.'

  install_playwright:
    description: |
      Install and cache Playwright browsers before the agent runs. Set to
      'true' when your automation drives Playwright. Skipped when 'false'
      (default) so non-Playwright automations don't pay for it. Doing this
      here keeps the install off the agent's subagent clock.
    required: false
    default: 'false'

  playwright_browser:
    description: "Playwright browser to install when install_playwright=true (chromium | firefox | webkit | all)."
    required: false
    default: 'chromium'

outputs:
  session_id:
    description: 'orb session ID for this automation run'
    value: ${{ steps.run-codex.outputs.session_id }}

  run_status:
    description: 'PASS or FAIL from the automation run'
    value: ${{ steps.run-codex.outputs.run_status }}

runs:
  using: 'composite'
  steps:
    # ─────────────────────────────────────────────
    # Step 1: Install orb binary
    # ─────────────────────────────────────────────
    - name: Install orb
      shell: bash
      env:
        INPUT_ORB_BINARY_PATH: ${{ inputs.orb_binary_path }}
      run: |
        set -euo pipefail

        INSTALL_DIR="$HOME/.local/bin"
        mkdir -p "$INSTALL_DIR"

        ORB_BIN="${INPUT_ORB_BINARY_PATH:-${ORB_BINARY_PATH:-}}"

        if [ -n "$ORB_BIN" ]; then
          echo "Using pre-built orb binary: $ORB_BIN"
          install -m 755 "$ORB_BIN" "$INSTALL_DIR/orb"
          echo "$INSTALL_DIR" >> "$GITHUB_PATH"
        else
          OS="$(uname -s | tr '[:upper:]' '[:lower:]')"

          if ! command -v brew &>/dev/null; then
            if [ "$OS" = "linux" ]; then
              NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
              if [ -x "/home/linuxbrew/.linuxbrew/bin/brew" ]; then
                eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
                echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
              else
                echo "Linuxbrew installation failed"; exit 1
              fi
            else
              echo "Homebrew is required on macOS"; exit 1
            fi
          fi

          brew tap augur-ai/tap
          brew install augur-ai/tap/orb
          BREW_PREFIX="$(brew --prefix)"
          echo "$BREW_PREFIX/bin" >> "$GITHUB_PATH"
        fi

        # `$GITHUB_PATH` only applies to subsequent steps; within this
        # step we still need an absolute path. Resolve it from whichever
        # branch above ran (pre-built bin → INSTALL_DIR; brew → BREW_PREFIX).
        ORB_CMD="$([ -n "${ORB_BIN:-}" ] && echo "$INSTALL_DIR/orb" || echo "${BREW_PREFIX}/bin/orb")"
        "$ORB_CMD" --version
        echo "orb installed: $($ORB_CMD --version)"

    # ─────────────────────────────────────────────
    # Step 1b: Install Codex CLI (npm global)
    #
    # `orb automation exec --provider codex` spawns the `codex` CLI as a
    # child. On a fresh GHA runner that binary is NOT preinstalled, so
    # the spawn fails immediately and orb reports "0/2 tasks successful,
    # 2 incomplete" within ~300ms — looks identical to a narration-only
    # run, but the actual cause is "command not found". Mirrors the
    # Setup-Gemini-CLI step in the gemini action.
    # ─────────────────────────────────────────────
    - name: Resolve npm prefix
      id: npm-prefix-codex
      shell: bash
      run: |
        set -euo pipefail
        PREFIX="$(npm config get prefix)"
        echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"

    - name: Cache Codex CLI
      id: cache-codex
      uses: actions/cache@v4
      with:
        path: |
          ${{ steps.npm-prefix-codex.outputs.prefix }}/lib/node_modules/@openai/codex
          ${{ steps.npm-prefix-codex.outputs.prefix }}/bin/codex
        key: codex-cli-${{ runner.os }}-${{ runner.arch }}-v1

    - name: Install Codex CLI
      if: steps.cache-codex.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        if command -v codex &>/dev/null; then
          echo "Codex CLI already installed: $(codex --version 2>/dev/null || true)"
        else
          npm install -g @openai/codex 2>/dev/null || true
          if ! command -v codex &>/dev/null; then
            echo "Codex CLI not found on PATH after npm install -g @openai/codex"
            echo "Ensure OPENAI_API_KEY is set for the run."
          else
            echo "Codex CLI installed: $(codex --version 2>/dev/null || true)"
          fi
        fi

    - name: Verify Codex CLI
      shell: bash
      run: |
        set -euo pipefail
        if ! command -v codex &>/dev/null; then
          echo "codex not found on PATH after install/cache restore"; exit 1
        fi
        echo "codex: $(codex --version 2>/dev/null || true)"

    # Codex CLI 0.128+ uses ChatGPT login by default and ignores
    # OPENAI_API_KEY at exec time unless `codex login --with-api-key`
    # has registered the key. Without this, `orb automation exec
    # --provider codex` spawns codex which then 401s at
    # wss://api.openai.com/v1/responses with "Missing bearer or basic
    # authentication in header" — symptom looks identical to a wrong
    # key but the cause is "no api-key login persisted".
    # See https://developers.openai.com/codex/auth — for CI/CD the
    # documented method is API-key login via stdin.
    - name: Login to Codex with API key
      shell: bash
      env:
        OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
      run: |
        set -euo pipefail
        if [ -z "${OPENAI_API_KEY:-}" ]; then
          echo "OPENAI_API_KEY not set — cannot login to Codex CLI"
          exit 1
        fi
        printf '%s' "$OPENAI_API_KEY" | codex login --with-api-key
        echo "Codex login complete (API key)"

    # ─────────────────────────────────────────────
    # Step 2: Authenticate orb
    # ─────────────────────────────────────────────
    - name: Authenticate orb
      shell: bash
      env:
        ORB_API_TOKEN: ${{ env.ORB_API_TOKEN }}
        ORB_PROJECT_ID: ${{ env.ORB_PROJECT_ID }}
      run: |
        set -euo pipefail
        BACKEND_URL="${ORB_BACKEND_URL:-https://app.getaugur.ai}"
        echo "Resolving identity from ORB_API_TOKEN..."
        if orb auth login --backend "$BACKEND_URL"; then
          echo "orb auth login succeeded"
        else
          if [ "${ACT:-false}" = "true" ]; then
            echo "orb auth login failed under act; continuing in offline mode."
            exit 0
          fi
          echo "orb auth login failed"; exit 1
        fi

    # ─────────────────────────────────────────────
    # Step 3: Initialize orb
    # ─────────────────────────────────────────────
    - name: Initialize orb
      shell: bash
      run: |
        set -euo pipefail
        echo "Initializing orb..."
        # `--agents=codex` is REQUIRED — without it orb init does not
        # write ~/.codex/config.toml with the orb MCP servers
        # (tasktracker / procedure-tracer / memory / code / playwright).
        # Codex CLI then runs with zero tools to call and the orchestrator
        # turn is "narration-only": no tool_calls, all tasks left
        # pending/in_progress, procedure exits with 0/N successful.
        # Mirrors the gemini action's `--agents=gemini` pattern.
        if orb init --skip-index --no-browser --no-report --agents=codex; then
          echo "orb init succeeded"
        else
          if [ "${ACT:-false}" = "true" ]; then
            echo "orb init failed under act; continuing."
            exit 0
          fi
          echo "orb init failed"; exit 1
        fi

        # Earlier this step injected `startup_timeout_sec = 60` into every
        # [mcp_servers.X] block to debug suspected slow-cold-start tool
        # dropping. The real cause was missing codex CLI (now installed
        # in Setup Codex CLI step above), and the awk pattern matched
        # `[mcp_servers.code.env]` too, putting an int in a string-only
        # env table → "invalid type: integer `60`, expected a string".
        # Diagnostic kept (cat the config) but injection removed.
        CODEX_CFG="$HOME/.codex/config.toml"
        if [ -f "$CODEX_CFG" ]; then
          echo "── codex config (orb init output) ──"
          cat "$CODEX_CFG"

        # Codex agent files require `name` and `description` (per
        # /codex/subagents docs). orb's bundled templates only set
        # `model` + `developer_instructions`, so codex silently rejects
        # the agent → orchestrator turn has no agent context → no tools
        # → "narration-only" exit. Patch the agent files in place to add
        # the missing required fields. Idempotent.
        for f in "$HOME"/.codex/agents/*.toml; do
          [ -f "$f" ] || continue
          base=$(basename "$f" .toml)
          if ! grep -q '^name\s*=' "$f"; then
            { echo "name = \"$base\""; echo "description = \"orb $base\""; cat "$f"; } > "$f.new" && mv "$f.new" "$f"
            echo "── patched $f with name/description ──"
            head -5 "$f"
          fi
        done
        else
          echo "::warning::$CODEX_CFG not present — orb init may have skipped codex agents wiring"
        fi

    # ─────────────────────────────────────────────
    # Step 4: Start orb gateway
    # ─────────────────────────────────────────────
    - name: Start orb gateway
      shell: bash
      env:
        ORB_API_TOKEN: ${{ env.ORB_API_TOKEN }}
        ORB_PROJECT_ROOT: ${{ github.workspace }}/${{ inputs.working_directory }}
        ORB_PROJECT_ID: ${{ env.ORB_PROJECT_ID }}
      run: |
        set -euo pipefail
        BACKEND_URL="${ORB_BACKEND_URL:-https://app.getaugur.ai}"
        echo "Starting orb gateway..."
        if orb gateway start --background --backend-url "$BACKEND_URL"; then
          for i in $(seq 1 15); do
            if curl -s -o /dev/null --connect-timeout 2 http://localhost:8788/_gittrace/session/bind 2>/dev/null; then
              echo "Gateway ready on port 8788"; break
            fi
            echo "  waiting for gateway... $i/15"; sleep 2
          done
        else
          if [ "${ACT:-false}" = "true" ]; then
            echo "Gateway failed under act; continuing."
            exit 0
          fi
          echo "Gateway failed to start"; exit 1
        fi

    # ─────────────────────────────────────────────
    # Step 4b: Setup Playwright (optional, opt-in via install_playwright)
    #
    # The procedure scaffold has no install_deps task; the agent expects
    # Playwright + chromium to be on disk before run_test. Hoist the
    # install here when the caller opts in. `--with-deps` always — it
    # uses Playwright's apt list which tracks Ubuntu package renames
    # (e.g. libasound2 → libasound2t64 on 24.04). Skipping it leaves
    # chromium installed but unable to launch.
    # ─────────────────────────────────────────────
    - name: Cache Playwright browsers
      if: inputs.install_playwright == 'true'
      id: cache-playwright
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ms-playwright-${{ runner.os }}-${{ runner.arch }}-${{ inputs.playwright_browser }}-${{ hashFiles('**/package-lock.json', '**/package.json') }}
        restore-keys: |
          ms-playwright-${{ runner.os }}-${{ runner.arch }}-${{ inputs.playwright_browser }}-
        save-always: true

    - name: Install Playwright + npm deps (optional)
      if: inputs.install_playwright == 'true'
      shell: bash
      working-directory: ${{ github.workspace }}/${{ inputs.working_directory }}
      env:
        PLAYWRIGHT_BROWSER: ${{ inputs.playwright_browser }}
        PLAYWRIGHT_CACHE_HIT: ${{ steps.cache-playwright.outputs.cache-hit }}
      run: |
        set -euo pipefail
        if [ ! -f package.json ]; then
          echo "install_playwright=true but no package.json in working directory — skipping"
          exit 0
        fi
        if [ ! -d node_modules ]; then
          echo "Installing npm deps..."
          npm install --no-audit --no-fund
        else
          echo "node_modules already present — skipping npm install"
        fi
        # `--with-deps` runs apt-get for ~50 system libs every time
        # (libnss3, libgtk-3, ffmpeg, …) — that's the slow
        # "Switching to root user to install dependencies..." step.
        # On cache hit the browser binaries are already in
        # ~/.cache/ms-playwright AND ubuntu-latest images keep system
        # libs across runs, so we skip --with-deps. On miss we still
        # install with deps so a fresh runner can run Chromium.
        if [ "${PLAYWRIGHT_CACHE_HIT:-}" = "true" ]; then
          echo "Cache hit — running 'npx playwright install $PLAYWRIGHT_BROWSER' (no --with-deps)"
          npx playwright install "$PLAYWRIGHT_BROWSER"
        else
          echo "Cache miss — running 'npx playwright install --with-deps $PLAYWRIGHT_BROWSER'"
          npx playwright install --with-deps "$PLAYWRIGHT_BROWSER"
        fi

    # ─────────────────────────────────────────────
    # Step 5: Run automation with Codex
    # ─────────────────────────────────────────────
    - name: Run automation with Codex
      id: run-codex
      shell: bash
      env:
        OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
        ORB_API_TOKEN: ${{ env.ORB_API_TOKEN }}
        ORB_PROJECT_ROOT: ${{ github.workspace }}/${{ inputs.working_directory }}
        ORB_PROJECT_ID: ${{ env.ORB_PROJECT_ID }}
      run: |
        set -euo pipefail

        AUTOMATION="${{ inputs.automation }}"
        PARAMS_RAW="${{ inputs.params }}"
        SESSION_ID="$(python3 -c "import uuid; print(str(uuid.uuid4()))")"

        PARAM_ARGS=()
        if [ -n "$PARAMS_RAW" ]; then
          while IFS= read -r line; do
            line="$(echo "$line" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
            [ -z "$line" ] && continue
            PARAM_ARGS+=("--param" "$line")
          done <<< "$PARAMS_RAW"
        fi

        echo "session_id=$SESSION_ID" >> "$GITHUB_OUTPUT"
        echo "Running: orb automation exec $AUTOMATION --provider codex --session-id $SESSION_ID --gateway-url http://localhost:8787 ${PARAM_ARGS[*]:-}"

        set +e
        orb automation exec "$AUTOMATION" \
          --provider codex \
          --model "${{ inputs.model }}" \
          --session-id "$SESSION_ID" \
          --gateway-url http://localhost:8787 \
          "${PARAM_ARGS[@]}"
        EXIT=$?
        set -e

        if [ "$EXIT" -eq 0 ]; then
          echo "run_status=PASS" >> "$GITHUB_OUTPUT"
        else
          echo "run_status=FAIL" >> "$GITHUB_OUTPUT"
        fi

        exit $EXIT

    # ─────────────────────────────────────────────
    # Step 7: Stop gateway (best-effort)
    # ─────────────────────────────────────────────
    - name: Stop orb gateway
      shell: bash
      if: always()
      run: orb gateway stop || true
