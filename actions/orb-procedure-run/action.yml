name: 'orb Procedure Run'
description: 'Run an orb procedure using Claude Code as the execution engine'
author: 'augur-ai'

branding:
  icon: 'cpu'
  color: 'green'

# Secrets are read from environment variables set at the workflow/repo level:
#   ANTHROPIC_API_KEY  — Anthropic API key
#   ORB_API_TOKEN      — orb registry API token
#   ORB_BACKEND_URL    — orb backend URL (defaults to https://app.getaugur.ai)

inputs:
  procedure:
    description: 'Procedure ID to run (e.g. todo-app-ci, gha-error-triage-and-fix)'
    required: true

  params:
    description: |
      Newline-separated key=value pairs passed as --param flags to orb procedure exec.
      Example:
        repo_path=/home/runner/work/myapp/myapp
        node_version=20
    required: false
    default: ''

  orb_version:
    description: 'orb version to install (e.g. v0.5.0). Defaults to latest.'
    required: false
    default: 'latest'

  orb_binary_path:
    description: |
      Path to a pre-built orb binary. If set, skips the download step.
      Useful for local act testing or air-gapped environments.
    required: false
    default: ''

  model:
    description: 'Claude model to use'
    required: false
    default: 'claude-sonnet-4-5'

  max_turns:
    description: 'Maximum number of agentic turns Claude can take. Leave empty for no limit.'
    required: false
    default: ''

  working_directory:
    description: |
      Working directory for orb commands. Defaults to the workspace root.
      Set this for monorepos where the procedure lives in a subdirectory.
    required: false
    default: '.'

outputs:
  session_id:
    description: 'orb session ID for this procedure run'
    value: ${{ steps.run-procedure.outputs.session_id }}

  run_status:
    description: 'PASS or FAIL from the procedure final report'
    value: ${{ steps.run-claude.outputs.run_status }}

runs:
  using: 'composite'
  steps:
    # ─────────────────────────────────────────────
    # Step 1: Install orb binary
    # ─────────────────────────────────────────────
    - name: Install orb
      shell: bash
      env:
        INPUT_ORB_BINARY_PATH: ${{ inputs.orb_binary_path }}
      run: |
        set -euo pipefail

        INSTALL_DIR="$HOME/.local/bin"
        mkdir -p "$INSTALL_DIR"

        # Prefer explicit input, then fall back to environment ORB_BINARY_PATH (e.g. from act .env)
        ORB_BIN="${INPUT_ORB_BINARY_PATH:-${ORB_BINARY_PATH:-}}"

        if [ -n "$ORB_BIN" ]; then
          echo "Using pre-built orb binary: $ORB_BIN"
          install -m 755 "$ORB_BIN" "$INSTALL_DIR/orb"
          echo "$INSTALL_DIR" >> "$GITHUB_PATH"
        else
          OS="$(uname -s | tr '[:upper:]' '[:lower:]')"

          if ! command -v brew &>/dev/null; then
            echo "Homebrew not found, installing..."

            if [ "$OS" = "linux" ]; then
              # Install Homebrew (Linuxbrew) non-interactively
              NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"

              if [ -x "/home/linuxbrew/.linuxbrew/bin/brew" ]; then
                eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
                echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
              else
                echo "Linuxbrew installation did not produce /home/linuxbrew/.linuxbrew/bin/brew"
                exit 1
              fi
            else
              # On macOS runners, brew should normally already be installed.
              # If it's missing, fail fast with a clear error.
              echo "Homebrew is required on macOS runners but was not found in PATH"
              exit 1
            fi
          fi

          echo "Installing orb via Homebrew tap augur-ai/tap..."
          brew tap augur-ai/tap
          brew install augur-ai/tap/orb

          # Ensure Homebrew bin is on PATH for subsequent steps
          BREW_PREFIX="$(brew --prefix)"
          echo "$BREW_PREFIX/bin" >> "$GITHUB_PATH"
        fi

        orb --version
        echo "orb installed: $(orb --version)"

    # ─────────────────────────────────────────────
    # Step 1b: Authenticate orb
    # ─────────────────────────────────────────────
    - name: Authenticate orb
      shell: bash
      env:
        ORB_API_TOKEN: ${{ env.ORB_API_TOKEN }}
      run: |
        set -euo pipefail

        BACKEND_URL="${ORB_BACKEND_URL:-https://app.getaugur.ai}"

        echo "🔐 Resolving identity from ORB_API_TOKEN against $BACKEND_URL..."
        if orb auth login --backend "$BACKEND_URL"; then
          echo "✅ orb auth login succeeded"
        else
          if [ "${ACT:-false}" = "true" ]; then
            echo "⚠️ orb auth login failed under nektos/act (ACT=true)."
            echo "   Continuing in local/offline mode — backend-dependent features (live log, team memory) will be unavailable."
            exit 0
          fi
          echo "❌ orb auth login failed and ACT is not true — failing CI run."
          exit 1
        fi

    # ─────────────────────────────────────────────
    # Step 1c: Initialize orb (extracts MCPs, writes Claude hooks)
    # ─────────────────────────────────────────────
    - name: Initialize orb
      shell: bash
      run: orb init --skip-index --no-browser --no-report --agents=claude

    # ─────────────────────────────────────────────
    # Step 2: Start orb gateway (must be up before --print-prompt so session
    #          registration succeeds and EventRelay can forward events)
    # ─────────────────────────────────────────────
    - name: Start orb gateway
      shell: bash
      env:
        ORB_API_TOKEN: ${{ env.ORB_API_TOKEN }}
        ORB_PROJECT_ROOT: ${{ github.workspace }}/${{ inputs.working_directory }}
      run: |
        BACKEND_URL="${ORB_BACKEND_URL:-https://app.getaugur.ai}"
        orb gateway start --background --backend-url "$BACKEND_URL"
        for i in $(seq 1 15); do
          if curl -s -o /dev/null --connect-timeout 2 http://localhost:8788/_gittrace/session/bind 2>/dev/null; then
            echo "Gateway ready on port 8788"; break
          fi
          echo "  waiting for gateway... $i/15"; sleep 2
        done

    # ─────────────────────────────────────────────
    # Step 3: Build the exec prompt (no Claude yet)
    #          Gateway must be running so session bind succeeds here.
    # ─────────────────────────────────────────────
    - name: Build procedure exec prompt
      id: run-procedure
      shell: bash
      env:
        ORB_API_TOKEN: ${{ env.ORB_API_TOKEN }}
        ORB_PROJECT_ROOT: ${{ github.workspace }}/${{ inputs.working_directory }}
      run: |
        set -euo pipefail

        PROCEDURE="${{ inputs.procedure }}"
        PARAMS_RAW="${{ inputs.params }}"
        SESSION_ID="$(python3 -c "import uuid; print(str(uuid.uuid4()))")"

        # Build --param flags as an array (handles values with spaces correctly)
        PARAM_ARGS=()
        if [ -n "$PARAMS_RAW" ]; then
          while IFS= read -r line; do
            line="$(echo "$line" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
            [ -z "$line" ] && continue
            PARAM_ARGS+=("--param" "$line")
          done <<< "$PARAMS_RAW"
        fi

        PROMPT_FILE="/tmp/orb-exec-prompt.txt"

        echo "Running: orb procedure exec $PROCEDURE --print-prompt --session-id $SESSION_ID ${PARAM_ARGS[*]:-}"
        orb procedure exec "$PROCEDURE" \
          --print-prompt \
          --session-id "$SESSION_ID" \
          "${PARAM_ARGS[@]}" \
          > "$PROMPT_FILE"

        echo "session_id=$SESSION_ID" >> "$GITHUB_OUTPUT"
        echo "prompt_file=$PROMPT_FILE" >> "$GITHUB_OUTPUT"
        echo "Procedure plan saved. Session: $SESSION_ID"
        echo "Prompt length: $(wc -c < "$PROMPT_FILE") bytes"

        # Print live run URL after session bind (--print-prompt registers session with gateway)
        BACKEND_URL="${ORB_BACKEND_URL:-https://app.getaugur.ai}"
        LIVE_URL="${BACKEND_URL}/workflow-run?session_id=${SESSION_ID}"
        echo ""
        echo "::notice title=Live Run::${LIVE_URL}"
        echo "📊 Live run: ${LIVE_URL}"
        echo ""

    # ─────────────────────────────────────────────
    # Step 4: Write CI permissions settings + MCP config
    # ─────────────────────────────────────────────
    - name: Write CI permissions settings
      shell: python3 {0}
      run: |
        import json, os, pathlib

        settings = {
          "permissions": {
            "allow": [
              "Bash",
              "Read", "Write", "Edit", "Glob", "Grep",
              "mcp__tasktracker",
              "mcp__memory",
              "mcp__proceduretracer"
            ]
          }
        }

        out = "/tmp/orb-ci-settings.json"
        with open(out, "w") as f:
            json.dump(settings, f, indent=2)

        print(f"CI settings written to {out}")
        print(json.dumps(settings, indent=2))

        # Extract mcpServers from ~/.claude.json (written by orb init) into a
        # dedicated --mcp-config file.  claude -p does not auto-read ~/.claude.json
        # in non-interactive pipe mode, so we must pass --mcp-config explicitly.
        claude_json_path = pathlib.Path.home() / ".claude.json"
        mcp_config = {"mcpServers": {}}
        if claude_json_path.exists():
            try:
                data = json.loads(claude_json_path.read_text())
                mcp_config["mcpServers"] = data.get("mcpServers", {})
            except Exception as e:
                print(f"Warning: could not parse ~/.claude.json: {e}")

        mcp_out = "/tmp/orb-mcp-config.json"
        with open(mcp_out, "w") as f:
            json.dump(mcp_config, f, indent=2)

        print(f"\nMCP config written to {mcp_out}")
        print(json.dumps(mcp_config, indent=2))

    # ─────────────────────────────────────────────
    # Step 4b: Install Claude Code CLI
    # ─────────────────────────────────────────────
    - name: Install Claude Code CLI
      shell: bash
      run: |
        if command -v claude &>/dev/null; then
          echo "Claude already installed: $(claude --version 2>/dev/null || true)"
        else
          npm install -g @anthropic-ai/claude-code
          echo "Claude installed: $(claude --version 2>/dev/null || true)"
        fi

    # ─────────────────────────────────────────────
    # Step 4c: Verify MCP binaries are executable
    # ─────────────────────────────────────────────
    - name: Verify MCP binaries
      shell: bash
      run: |
        echo "=== MCP binary check ==="
        for bin in mcp-tasktracker mcp-memory mcp-procedure-trace; do
          BIN_PATH="$HOME/.orb/bin/$bin"
          if [ -f "$BIN_PATH" ]; then
            echo "$bin: exists"
            file "$BIN_PATH" || true
            echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"0"}}}' \
              | timeout 3 "$BIN_PATH" 2>&1 | head -3 || echo "$bin: FAILED to respond to init"
          else
            echo "$bin: MISSING at $BIN_PATH"
          fi
        done

    # ─────────────────────────────────────────────
    # Step 5: Run Claude via claude -p
    #   --mcp-config   /tmp/orb-mcp-config.json  (extracted from ~/.claude.json by Step 4)
    #   --settings     /tmp/orb-ci-settings.json  (permissions — Step 4)
    #   ANTHROPIC_BASE_URL routes all Claude API calls through the orb
    #   gateway so tool events are relayed to the Live Log UI.
    #   Note: claude -p does NOT auto-load ~/.claude.json in pipe mode;
    #   --mcp-config must be passed explicitly for MCP tools to be available.
    # ─────────────────────────────────────────────
    - name: Run claude -p
      id: run-claude
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ env.ANTHROPIC_API_KEY }}
        # Route all Claude API calls through the orb gateway so tool events
        # are relayed to the backend and appear in the Live Log UI.
        ANTHROPIC_BASE_URL: http://localhost:8787
        ORB_SESSION_ID: ${{ steps.run-procedure.outputs.session_id }}
        ORB_PROJECT_ROOT: ${{ github.workspace }}/${{ inputs.working_directory }}
        ORB_API_TOKEN: ${{ env.ORB_API_TOKEN }}
        ORB_BACKEND_URL: ${{ env.ORB_BACKEND_URL || 'https://app.getaugur.ai' }}
      run: |
        set -euo pipefail

        SESSION_ID="${{ steps.run-procedure.outputs.session_id }}"
        MODEL="${{ inputs.model }}"
        MAX_TURNS="${{ inputs.max_turns }}"
        PROMPT_FILE="${{ steps.run-procedure.outputs.prompt_file }}"

        # Build optional flags
        EXTRA_ARGS=()
        [ -n "$MODEL" ] && EXTRA_ARGS+=("--model" "$MODEL")
        [ -n "$MAX_TURNS" ] && EXTRA_ARGS+=("--max-turns" "$MAX_TURNS")

        echo "=== Running claude -p (session: $SESSION_ID) ==="
        set -o pipefail
        claude -p "$(cat "$PROMPT_FILE")" \
          --mcp-config /tmp/orb-mcp-config.json \
          --settings /tmp/orb-ci-settings.json \
          --session-id "$SESSION_ID" \
          --output-format text \
          "${EXTRA_ARGS[@]}" \
          2>&1 | tee /tmp/orb-claude.log
        EXIT=${PIPESTATUS[0]}
        echo "claude -p exit code: $EXIT"

        # Extract ci_status — match various forms Claude uses: "Overall: PASS", "**PASS**", "Status: PASS"
        if grep -qiE "(Overall|Status)[^a-zA-Z]*(PASS)|[*_]{0,2}PASS[*_]{0,2}" /tmp/orb-claude.log 2>/dev/null; then
          echo "run_status=PASS" >> "$GITHUB_OUTPUT"
        elif grep -qiE "(Overall|Status)[^a-zA-Z]*(FAIL)|[*_]{0,2}FAIL[*_]{0,2}" /tmp/orb-claude.log 2>/dev/null; then
          echo "run_status=FAIL" >> "$GITHUB_OUTPUT"
        else
          echo "run_status=UNKNOWN" >> "$GITHUB_OUTPUT"
        fi

        exit $EXIT

    # ─────────────────────────────────────────────
    # Step 5b: Dump debug info (always)
    # ─────────────────────────────────────────────
    - name: Dump debug info
      shell: bash
      if: always()
      env:
        ORB_SESSION_ID: ${{ steps.run-procedure.outputs.session_id }}
      run: |
        echo "=== /tmp/orb-claude.log (last 300 lines) ==="
        tail -300 /tmp/orb-claude.log 2>/dev/null || echo "(no log)"

        echo ""
        echo "=== ~/.orb/sessions/$ORB_SESSION_ID/tasks.json ==="
        cat "$HOME/.orb/sessions/$ORB_SESSION_ID/tasks.json" 2>/dev/null || echo "(no tasks.json — MCP task tools were NOT called)"

        echo ""
        echo "=== ~/.orb/gateway.log (last 50 lines) ==="
        tail -50 "$HOME/.orb/gateway.log" 2>/dev/null || echo "(no gateway log)"

        echo ""
        echo "=== /tmp/mcp-tasktracker.log (last 50 lines) ==="
        tail -50 /tmp/mcp-tasktracker.log 2>/dev/null || echo "(no mcp-tasktracker log)"

        echo ""
        echo "=== /tmp/orb-mcp-config.json ==="
        cat /tmp/orb-mcp-config.json 2>/dev/null || echo "(no mcp config)"

    # ─────────────────────────────────────────────
    # Step 6: Stop gateway (best-effort cleanup)
    # ─────────────────────────────────────────────
    - name: Stop orb gateway
      shell: bash
      if: always()
      run: orb gateway stop || true
