name: 'testfold Launcher'
description: |
  Single composite that customers consume for ALL testfold automations.
  Installs orb, installs the chosen agent CLI, runs the automation by id
  from the customer repo's .orb/automations/<id>.json.

  No catalog fetch at runtime — manifests are shipped to the customer repo
  at install-PR time. The runtime path is: customer repo's local
  .orb/automations/<id>.json → `orb automation exec <id>`.
author: 'augur-ai'

branding:
  icon: 'play'
  color: 'green'

# Required env (set in the customer workflow's job-level `env:` block):
#   ANTHROPIC_API_KEY / OPENAI_API_KEY / GOOGLE_API_KEY  — at least one
#                       (matching the chosen agent)
#   ORB_BACKEND_URL    — testfold backend host (defaults to beta.testfold.ai)
#   ORB_API_TOKEN      — auth (identity resolved from this token only;
#                        ORB_ORG_ID is derived, customer doesn't set it)
#   GH_TOKEN           — for `gh` commands inside automation tasks

inputs:
  automation_id:
    description: 'Automation id from the customer repo .orb/automations/<id>.json (e.g. orb-review, orb-hunt, orb-change-impact, orb-test-generate-from-plan)'
    required: true
  agent:
    description: 'Agent to run with: claude | codex | gemini. NO default — caller must pick.'
    required: true
  payload:
    description: |
      JSON object — automation-specific data only (ref_range, pr_number,
      repo, mode, diff_path, etc). Each top-level key becomes an env var
      inside the automation tasks (`${key:-default}` resolves from these).
      Cross-cutting fields (augur_run_id, watch_id, project_slug) are
      first-class inputs below.
    required: false
    default: '{}'
  augur_run_id:
    description: 'testfold run correlation id — exported as AUGUR_RUN_ID env, propagated to publish-results so the backend can update pm_plan_runs'
    required: false
    default: ''
  watch_id:
    description: 'testfold release_watches.id — exported as WATCH_ID env (used by post_inventory.sh and other publish scripts)'
    required: false
    default: '0'
  project_slug:
    description: 'testfold project slug — exported as PROJECT_SLUG env'
    required: false
    default: 'default'
  orb_binary_path:
    description: 'Path to a pre-built orb binary. If set, skips the brew-tap install. Used by local `act` runs that bind-mount a Linux binary.'
    required: false
    default: ''
  install_playwright:
    description: "'true' to pre-install Playwright browsers before the agent runs. Skipped by default."
    required: false
    default: 'false'
  playwright_browser:
    description: 'Playwright browser to install when install_playwright=true (chromium | firefox | webkit | all)'
    required: false
    default: 'chromium'
  model:
    description: 'Agent model override (provider-specific). Empty → orb tier-mapped default.'
    required: false
    default: ''
  working_directory:
    description: 'Working directory for orb commands (automations load from <wd>/.orb/automations/)'
    required: false
    default: '.'

outputs:
  status:
    description: 'PASS or FAIL'
    value: ${{ steps.run.outputs.run_status }}
  session_id:
    description: 'orb session id (UUID) — visible at <backend>/p/<slug>/runs?session_id=<id>'
    value: ${{ steps.run.outputs.session_id }}

runs:
  using: 'composite'
  steps:
    # ──────────────────────────────────────────────────────────────────
    # 1. Validate agent
    # ──────────────────────────────────────────────────────────────────
    - name: Validate agent
      shell: bash
      run: |
        case "${{ inputs.agent }}" in
          claude|codex|gemini) ;;
          *) echo "::error::Unknown agent '${{ inputs.agent }}'. Supported: claude | codex | gemini"; exit 1 ;;
        esac

    # ──────────────────────────────────────────────────────────────────
    # 2. Install orb binary (pre-built path OR brew tap)
    # ──────────────────────────────────────────────────────────────────
    - name: Install orb
      shell: bash
      env:
        INPUT_ORB_BINARY_PATH: ${{ inputs.orb_binary_path }}
      run: |
        set -euo pipefail
        INSTALL_DIR="$HOME/.local/bin"
        mkdir -p "$INSTALL_DIR"
        ORB_BIN="${INPUT_ORB_BINARY_PATH:-${ORB_BINARY_PATH:-}}"
        if [ -n "$ORB_BIN" ]; then
          install -m 755 "$ORB_BIN" "$INSTALL_DIR/orb"
          echo "$INSTALL_DIR" >> "$GITHUB_PATH"
          "$INSTALL_DIR/orb" --version
        else
          OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
          if ! command -v brew &>/dev/null; then
            if [ "$OS" = "linux" ]; then
              NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
              eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
              echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
            else
              echo "::error::Homebrew is required on macOS"; exit 1
            fi
          fi
          brew tap augur-ai/tap
          brew install augur-ai/tap/orb
          BREW_PREFIX="$(brew --prefix)"
          echo "$BREW_PREFIX/bin" >> "$GITHUB_PATH"
          "$BREW_PREFIX/bin/orb" --version
        fi

    # ──────────────────────────────────────────────────────────────────
    # 3. Install the chosen agent CLI (codex / gemini / claude).
    #    Each block is conditional on `inputs.agent`.
    # ──────────────────────────────────────────────────────────────────
    - name: Resolve npm prefix (codex/gemini)
      if: ${{ inputs.agent == 'codex' || inputs.agent == 'gemini' }}
      id: npm-prefix
      shell: bash
      run: |
        set -euo pipefail
        PREFIX="$(npm config get prefix)"
        echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"
        echo "$PREFIX/bin" >> "$GITHUB_PATH"

    - name: Cache Codex CLI
      if: ${{ inputs.agent == 'codex' }}
      id: cache-codex
      uses: actions/cache@v4
      with:
        path: |
          ${{ steps.npm-prefix.outputs.prefix }}/lib/node_modules/@openai/codex
          ${{ steps.npm-prefix.outputs.prefix }}/bin/codex
        key: codex-cli-${{ runner.os }}-${{ runner.arch }}-v1
    - name: Install + login Codex CLI
      if: ${{ inputs.agent == 'codex' }}
      shell: bash
      env:
        OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
      run: |
        set -euo pipefail
        # `orb automation exec --provider codex` spawns the `codex` binary.
        # On a fresh runner it's not preinstalled → spawn fails with
        # "command not found" and orb reports "0/N tasks successful" in
        # ~300ms (looks like a narration bug, actually missing CLI).
        if ! command -v codex &>/dev/null; then
          npm install -g @openai/codex
        fi
        codex --version
        # Codex CLI 0.128+ uses ChatGPT-login by default and ignores
        # OPENAI_API_KEY unless `codex login --with-api-key` has registered
        # the key. CI-documented method: API-key login via stdin.
        if [ -z "${OPENAI_API_KEY:-}" ]; then
          echo "::error::OPENAI_API_KEY not set"; exit 1
        fi
        printf '%s' "$OPENAI_API_KEY" | codex login --with-api-key
        echo "codex ready"

    - name: Cache Gemini CLI
      if: ${{ inputs.agent == 'gemini' }}
      id: cache-gemini
      uses: actions/cache@v4
      with:
        path: |
          ${{ steps.npm-prefix.outputs.prefix }}/lib/node_modules/@google/gemini-cli
          ${{ steps.npm-prefix.outputs.prefix }}/bin/gemini
        key: gemini-cli-${{ runner.os }}-${{ runner.arch }}-v1
    - name: Install Gemini CLI
      if: ${{ inputs.agent == 'gemini' }}
      shell: bash
      run: |
        set -euo pipefail
        if ! command -v gemini &>/dev/null; then
          npm install -g @google/gemini-cli
        fi
        gemini --version

    - name: Install Claude Code CLI
      if: ${{ inputs.agent == 'claude' }}
      shell: bash
      run: |
        set -euo pipefail
        if ! command -v claude &>/dev/null; then
          npm install -g @anthropic-ai/claude-code
        fi
        claude --version

    # ──────────────────────────────────────────────────────────────────
    # 4. Authenticate orb
    # ──────────────────────────────────────────────────────────────────
    - name: Authenticate orb
      shell: bash
      run: |
        set -euo pipefail
        BACKEND_URL="${ORB_BACKEND_URL:-https://beta.testfold.ai}"
        if orb auth login --backend "$BACKEND_URL"; then
          echo "orb auth login ok"
        else
          if [ "${ACT:-false}" = "true" ]; then
            echo "::warning::orb auth login failed under act; continuing offline"
          else
            echo "::error::orb auth login failed against $BACKEND_URL"; exit 1
          fi
        fi
        if [ -f "$HOME/.orb/auth.json" ]; then
          ORG_ID=$(python3 -c "import json; print(json.load(open('$HOME/.orb/auth.json')).get('org_id',''))" 2>/dev/null || true)
          [ -n "$ORG_ID" ] && echo "ORB_ORG_ID=$ORG_ID" >> "$GITHUB_ENV"
        fi

    # ──────────────────────────────────────────────────────────────────
    # 5. Export per-automation env from the payload + first-class IDs.
    # ──────────────────────────────────────────────────────────────────
    - name: Export automation env
      shell: bash
      env:
        PAYLOAD: ${{ inputs.payload }}
      run: |
        set -euo pipefail
        if [ -n "${PAYLOAD:-}" ] && [ "${PAYLOAD}" != "{}" ]; then
          printf '%s' "$PAYLOAD" \
            | jq -r 'to_entries[] | "\(.key)=\((.value | tostring) | gsub("\r";" ") | gsub("\n";" "))"' \
            >> "$GITHUB_ENV"
        fi
        {
          echo "AUGUR_RUN_ID=${{ inputs.augur_run_id }}"
          echo "WATCH_ID=${{ inputs.watch_id }}"
          echo "PROJECT_SLUG=${{ inputs.project_slug }}"
        } >> "$GITHUB_ENV"

    # ──────────────────────────────────────────────────────────────────
    # 6. Refresh skills from the testfold registry.
    # Falls back to the embedded bundle (shipped inside the orb binary)
    # when the registry is unreachable — covers offline runs and local
    # `act` runs whose backend isn't routable.
    # ──────────────────────────────────────────────────────────────────
    - name: Refresh skills
      shell: bash
      run: |
        if orb skills refresh; then
          echo "skills: refreshed from registry"
        elif orb skills refresh --source bundle; then
          echo "::notice::orb skills refresh fell back to embedded bundle (registry unreachable)"
        else
          echo "::warning::orb skills refresh failed (non-fatal)"
        fi

    # ──────────────────────────────────────────────────────────────────
    # 7. Initialize orb (idempotent).
    # ──────────────────────────────────────────────────────────────────
    - name: Initialize orb
      shell: bash
      working-directory: ${{ github.workspace }}/${{ inputs.working_directory }}
      run: orb init --non-interactive || true

    # ──────────────────────────────────────────────────────────────────
    # 8. (Optional) Playwright.
    # ──────────────────────────────────────────────────────────────────
    - name: Cache Playwright browsers
      if: ${{ inputs.install_playwright == 'true' }}
      id: cache-playwright
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ms-playwright-${{ runner.os }}-${{ runner.arch }}-${{ inputs.playwright_browser }}-${{ hashFiles('**/package-lock.json', '**/package.json') }}
        restore-keys: |
          ms-playwright-${{ runner.os }}-${{ runner.arch }}-${{ inputs.playwright_browser }}-
        save-always: true
    - name: Install Playwright
      if: ${{ inputs.install_playwright == 'true' }}
      shell: bash
      working-directory: ${{ github.workspace }}/${{ inputs.working_directory }}
      env:
        PLAYWRIGHT_BROWSER: ${{ inputs.playwright_browser }}
        PLAYWRIGHT_CACHE_HIT: ${{ steps.cache-playwright.outputs.cache-hit }}
      run: |
        set -euo pipefail
        [ -f package.json ] || { echo "no package.json — skipping"; exit 0; }
        [ -d node_modules ] || npm install --no-audit --no-fund
        if [ "${PLAYWRIGHT_CACHE_HIT:-}" = "true" ]; then
          npx playwright install "$PLAYWRIGHT_BROWSER"
        else
          npx playwright install --with-deps "$PLAYWRIGHT_BROWSER"
        fi

    # ──────────────────────────────────────────────────────────────────
    # 9. Start orb gateway (binds session_id → backend's sessions table).
    # ──────────────────────────────────────────────────────────────────
    - name: Start orb gateway
      shell: bash
      run: |
        set -euo pipefail
        BACKEND_URL="${ORB_BACKEND_URL:-https://beta.testfold.ai}"
        orb gateway start --background --backend-url "$BACKEND_URL"
        for i in $(seq 1 15); do
          code=$(curl -s --connect-timeout 2 -o /dev/null -w '%{http_code}' "http://localhost:8788/_gittrace/session/bind" 2>/dev/null || echo 000)
          [[ "$code" =~ ^[234] ]] && exit 0
          sleep 2
        done
        echo "::warning::gateway did not come up cleanly — continuing best-effort"

    # ──────────────────────────────────────────────────────────────────
    # 10. The actual work.
    # ──────────────────────────────────────────────────────────────────
    - name: Run orb automation exec
      id: run
      shell: bash
      working-directory: ${{ github.workspace }}/${{ inputs.working_directory }}
      env:
        # Automations reference $ORB_PROJECT_ROOT in their task shells —
        # standardise it here so they don't each have to fall back to $PWD.
        ORB_PROJECT_ROOT: ${{ github.workspace }}/${{ inputs.working_directory }}
      run: |
        set -uo pipefail
        SESSION_ID="$(python3 -c 'import uuid; print(uuid.uuid4())')"
        echo "session_id=$SESSION_ID" >> "$GITHUB_OUTPUT"
        MODEL_ARGS=()
        [ -n "${{ inputs.model }}" ] && MODEL_ARGS+=(--model "${{ inputs.model }}")
        echo "::group::orb automation exec ${{ inputs.automation_id }} --provider ${{ inputs.agent }}"
        orb automation exec "${{ inputs.automation_id }}" \
          --provider "${{ inputs.agent }}" \
          --session-id "$SESSION_ID" \
          --gateway-url "http://localhost:8787" \
          "${MODEL_ARGS[@]}"
        EXIT=$?
        echo "::endgroup::"
        if [ "$EXIT" -eq 0 ]; then
          echo "run_status=PASS" >> "$GITHUB_OUTPUT"
        else
          echo "run_status=FAIL" >> "$GITHUB_OUTPUT"
        fi
        exit $EXIT

    # ──────────────────────────────────────────────────────────────────
    # 11. Stop gateway (best-effort).
    # ──────────────────────────────────────────────────────────────────
    - name: Stop orb gateway
      if: always()
      shell: bash
      run: orb gateway stop || true
